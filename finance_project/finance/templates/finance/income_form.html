{% extends 'finance/base.html' %}
{% load i18n %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="bi bi-arrow-down-circle"></i> {{ title }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">{% trans "Hisob" %}</label>
                        {{ form.account }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">{% trans "Kategoriya" %}</label>
                        {{ form.category }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">{% trans "Summa" %} ({% trans "so'm" %})</label>
                        {{ form.amount }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">{% trans "Sana" %}</label>
                        {{ form.date }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">{% trans "Izoh" %} ({% trans "ixtiyoriy" %})</label>
                        {{ form.description }}
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success flex-fill">
                            <i class="bi bi-check-circle"></i> {% trans "Saqlash" %}
                        </button>
                        <a href="{% url 'finance:income_list' %}" class="btn btn-secondary flex-fill">
                            <i class="bi bi-x-circle"></i> {% trans "Bekor qilish" %}
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    select, input, textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ced4da;
        border-radius: 4px;
    }
</style>
{% endblock %}
